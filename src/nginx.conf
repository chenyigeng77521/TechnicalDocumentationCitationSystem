# Nginx 反向代理配置
# 用于统一访问前端 (3000) 和后端 (3002)

events {
    worker_connections  1024;
}

http {
    client_max_body_size 2048M;

    # --- 新增：推荐的性能与超时优化 ---
    # 增加读取和发送超时，防止大文件上传/下载时连接中断
    client_body_timeout 3600;
    send_timeout        3600;

    # 调整缓冲区大小，以适应更大的请求头和数据体
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;
    # HTTP 80 端口配置
    server {
    # 1. 在 listen 指令中加上 default_server
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        #listen 80;
        #server_name 0.0.0.0 localhost 192.168.3.196 172.25.178.137 172.20.10.2;

        # 前端服务
        location / {
            proxy_pass http://localhost:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Next.js 开发模式需要
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            # --- 新增这两行 ---
            # $host 变量通常包含请求中的 Host 头（即你的临时外网域名）
            add_header X-Real-Host $host;
    # --- 新增：禁止缓存的配置 ---

            # 1. 告诉浏览器不要缓存
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";

            # 2. (可选) 如果你用了 Cloudflare 的 CDN 代理，这行告诉 CF 也不要缓存
            proxy_set_header Cache-Control "no-cache";

            # $request_uri 变量包含完整的请求路径和参数
            add_header X-Real-URI $request_uri;

            # 如果你想看具体转发到了哪里，也可以加上这个
            add_header X-Upstream-Addr $upstream_addr;
            # 如果你想看具体转发到了哪里，也可以加上这个
            add_header X-Upstream-Addr $upstream_addr;
            add_header X-My-Server-IP $server_addr;
            add_header X-Nginx-Version $nginx_version;
        }

        # 后端 API 服务
        location /api/ {
            proxy_pass http://localhost:3002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 超时配置 - 问答接口可能需要较长时间
            proxy_connect_timeout 60s;
            proxy_send_timeout 3600;
            proxy_read_timeout 3600;
        }

        # 静态文件缓存（可选）
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://localhost:3000;
            expires 1h;
            add_header Cache-Control "public, immutable";
        }
    }

    # HTTP 443 端口配置（不使用 SSL 证书，仅作为额外 HTTP 访问端口）
    server {

        client_max_body_size 2048M;

        # --- 新增：推荐的性能与超时优化 ---
        # 增加读取和发送超时，防止大文件上传/下载时连接中断
        client_body_timeout 3600;
        send_timeout        3600;

    # 1. 在 listen 指令中加上 default_server
        listen 443 default_server;
        listen [::]:443 default_server;
        server_name _;

        #listen 443;
        #server_name localhost 192.168.3.196 172.25.178.137 172.20.10.2;

        # 前端服务
        location / {
            proxy_pass http://localhost:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Next.js 开发模式需要
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            # --- 新增这两行 ---
            # $host 变量通常包含请求中的 Host 头（即你的临时外网域名）
            add_header X-Real-Host $host;

            # $request_uri 变量包含完整的请求路径和参数
            add_header X-Real-URI $request_uri;

            # 如果你想看具体转发到了哪里，也可以加上这个
            add_header X-Upstream-Addr $upstream_addr;
            add_header X-My-Server-IP $server_addr;
            add_header X-Nginx-Version $nginx_version;
        }

        # 后端 API 服务
        location /api/ {
            proxy_pass http://localhost:3002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 超时配置 - 问答接口可能需要较长时间
            proxy_connect_timeout 60s;
            proxy_send_timeout 3600;
            proxy_read_timeout 3600;
        }

        # 静态文件缓存（可选）
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://localhost:3000;
            expires 1h;
            add_header Cache-Control "public, immutable";
        }
    }
}
