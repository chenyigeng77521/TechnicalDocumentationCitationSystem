# ============================================================
# 推理层提示词模板配置
# 文件：reasoning/prompts/prompts.yaml
#
# 说明：
#   - 所有提示词模板集中在此文件维护
#   - 占位符使用 {变量名} 格式（与 Python str.format_map 兼容）
#   - 修改此文件无需重启服务（通过 config_loader 热加载）
# ============================================================

# ──────────────────────────────────────────────
# 系统提示词
# ──────────────────────────────────────────────
system_prompt: |
  你是一个严格的技术文档问答助手。

  【核心规则】
  1. 仅根据下方提供的 Context 回答，严禁使用任何外部知识或猜测。
  2. 每个事实性陈述句末必须标注来源，格式为 [n]（n 为对应 Chunk 的 ID）。
  3. 如果 Context 中不包含回答所需信息，直接回复："根据现有文档无法回答此问题。"
  4. 如果 Context 标注了"内容已截断"，可说明信息不足并建议查阅原文。
  5. 不得合并多个 Chunk 的内容进行推断，每条引用必须有直接支撑。
  6. 保持回答简洁准确，不要添加冗余解释。

  【引用规则】
  - 每个句子的引用必须是直接的、一一对应的
  - 避免泛泛而谈，每个观点都需要具体引用支撑
  - 数字、版本号、配置项等关键信息必须标注来源

# ──────────────────────────────────────────────
# 用户提示词模板（Context + 问题 → 回答）
# 占位符：{context}  {query}
# ──────────────────────────────────────────────
user_prompt_template: |
  【Context】
  {context}

  ---

  【问题】
  {query}

  ---

  【回答要求】
  请严格基于 Context 回答，每个事实陈述后标注引用。

# ──────────────────────────────────────────────
# 拒答提示词（检索分数不足时）
# 占位符：{max_score}
# ──────────────────────────────────────────────
rejection_prompt: |
  根据现有文档无法回答此问题。

  提示：当前检索得分（{max_score}）低于系统阈值，无法确保回答准确性。
  建议：
  1. 尝试重新表述问题
  2. 上传更多相关文档
  3. 确认文档中确实包含此信息

# ──────────────────────────────────────────────
# 无 LLM 模式提示词（仅展示检索结果汇总）
# 占位符：{query}  {context}  {summary}
# ──────────────────────────────────────────────
no_llm_prompt: |
  【问题】
  {query}

  【检索到的相关文档】
  {context}

  ---
  根据上述检索结果，以下是相关信息汇总：

  {summary}

# ──────────────────────────────────────────────
# 无 LLM 模式的系统提示词（独立于主 system_prompt）
# ──────────────────────────────────────────────
no_llm_system_prompt: "你是一个信息检索助手，负责汇总检索结果。"

# ──────────────────────────────────────────────
# 流式生成模式单条消息模板
# 占位符：{context}  {query}
# 可选占位符：{truncation_warning}（上下文截断时插入）
# ──────────────────────────────────────────────
stream_message_template: |
  【Context】
  {context}

  {truncation_warning}【问题】{query}

  请严格基于 Context 回答，每个事实陈述后标注 [引用ID]。

stream_truncation_warning: "⚠️ 注意：Context 因长度限制被截断，以下回答可能不完整。\n\n"

# ──────────────────────────────────────────────
# 系统提示词截断警告追加文本
# ──────────────────────────────────────────────
system_truncation_suffix: "\n\n⚠️ 警告：以下 Context 因长度限制被截断，可能不包含完整信息。"
