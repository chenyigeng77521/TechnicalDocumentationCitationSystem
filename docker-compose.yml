version: '3.8'

services:
  # ==================== 后端服务 ====================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: knowledge-qa-backend
    ports:
      - "3002:3002"
    
    # 🔑 关键：挂载数据目录到宿主机
    volumes:
      - ./storage:/app/storage
    
    # 环境变量
    environment:
      - NODE_ENV=production
      - PORT=3002
      - HOST=0.0.0.0
      - DB_PATH=/app/storage/knowledge.db
      - INDEX_PATH=/app/storage/index
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4-turbo}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-large}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-1536}
      - STRICT_MODE=${STRICT_MODE:-true}
    
    # 重启策略
    restart: unless-stopped
    
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # 网络
    networks:
      - qa-network

  # ==================== 前端服务 ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: knowledge-qa-frontend
    ports:
      - "3000:3000"
    
    # 环境变量
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3002}
    
    # 依赖后端服务
    depends_on:
      backend:
        condition: service_healthy
    
    # 重启策略
    restart: unless-stopped
    
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # 网络
    networks:
      - qa-network

# ==================== 网络配置 ====================
networks:
  qa-network:
    driver: bridge

# ==================== 卷配置（可选） ====================
# 如果使用命名卷而不是绑定挂载，取消下面的注释
# volumes:
#   storage_data:
#     driver: local
